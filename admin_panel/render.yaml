services:
  - type: web
    name: printx-admin-panel
    runtime: node
    buildCommand: npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port 10000
    env: {}
    routes:
      - path: /
        rewrite: /index.html
      - path: /dashboard
        rewrite: /index.html
      - path: /orders
        rewrite: /index.html
      - path: /products
        rewrite: /index.html
      - path: /categories
        rewrite: /index.html
      - path: /customers
        rewrite: /index.html
      # Catch-all for SPA routes
      - path: "/*"
        rewrite: /index.html




