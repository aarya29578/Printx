name: printx
description: Custom printing and branded merchandise app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # UI & Animations
  animate_do: ^3.3.4
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.1.1
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  animated_bottom_navigation_bar: ^1.3.1
  badges: ^3.1.2
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  flip_card: ^0.7.0
  pinput: ^3.0.1
  google_fonts: ^6.1.0

  # Gestures & interactions
  flutter_slidable: ^3.0.1

  # Forms & validation
  reactive_forms: ^16.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # Network (mock-ready)
  dio: ^5.4.0

  # Firebase
  firebase_core: ^3.15.1
  cloud_firestore: ^5.6.11
  firebase_auth: ^5.6.2
  firebase_storage: ^12.4.10

  # Image handling
  image_picker: ^1.0.7
  photo_view: ^0.14.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  flutter_rating_bar: ^4.0.1
  timeago: ^3.6.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
